[package]
name = "aicent-demo"
description = "Aicent Stack: Complete six-domain sovereign AI organism demo suite."
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage = "http://aicent.com/Demo/"
documentation = "https://github.com/Aicent-Stack/manifesto"
keywords = ["ai-demo", "sovereign-ai", "reflex-arc", "swarm-intelligence", "rfc-standard"]
categories = ["simulation", "network-programming", "robotics"]

# ====================================================================
# [BINARIES] - The Six-Domain Organism Suite
# Each binary acts as a point-of-entry for auditing specific RFC protocols.
# ====================================================================

[[bin]]
name = "aicent-organism"
path = "src/bin/aicent-organism.rs"

[[bin]]
name = "rttp-demo"
path = "src/bin/rttp-demo.rs"

[[bin]]
name = "rpki-demo"
path = "src/bin/rpki-demo.rs"

[[bin]]
name = "zcmk-demo"
path = "src/bin/zcmk-demo.rs"

[[bin]]
name = "gtiot-demo"
path = "src/bin/gtiot-demo.rs"

[[bin]]
name = "aicent-net-demo"
path = "src/bin/aicent-net-demo.rs"

# ====================================================================
# [DEPENDENCIES] - Integrated Workspace DNA
# ====================================================================

[dependencies]
# Core Organs from Workspace
aicent     = { workspace = true }
rttp       = { workspace = true }
rpki       = { workspace = true }
zcmk       = { workspace = true }
gtiot      = { workspace = true }
aicent-net = { workspace = true }

# --- Utilities & Telemetry ---
anyhow = { workspace = true }
serde  = { workspace = true, features = ["derive"] }
tokio  = { workspace = true, features = ["full"] }
rand   = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
# Benchmarking tools for sub-ms audit
criterion = "0.5"
