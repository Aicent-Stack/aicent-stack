name: "Organism Vitality & Protocol Audit"

# ====================================================================
# [RFC-DRIVEN CI] - Sovereign AI Infrastructure Standard
# This workflow orchestrates the synthesis and audit of all 10 repositories.
# Ensures sub-millisecond logic consistency across the six-domain organism.
# ====================================================================

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Security Hardening: Explicitly define restricted permissions
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Force Node24 to eliminate deprecation warnings in GitHub runners
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  synthesis-and-audit:
    name: "Integrated Organism Synthesis & Audit"
    runs-on: ubuntu-latest
    steps:
      # --- STAGE 1: FULL ORGANISM ASSEMBLY ---
      # Assembling the skeletal root workspace
      - name: "Checkout Root Workspace"
        uses: actions/checkout@v4

      # Synthesizing the individual organs (Repositories) into a unified body
      # Mapping the 10-repo architecture into a single physical workspace context
      - name: "Assemble Organism: Brain (AICENT)"
        uses: actions/checkout@v4
        with:
          repository: Aicent-Stack/aicent
          path: aicent

      - name: "Assemble Organism: Nerves (RTTP)"
        uses: actions/checkout@v4
        with:
          repository: Aicent-Stack/rttp
          path: rttp

      - name: "Assemble Organism: Immunity (RPKI)"
        uses: actions/checkout@v4
        with:
          repository: Aicent-Stack/rpki
          path: rpki

      - name: "Assemble Organism: Blood (ZCMK)"
        uses: actions/checkout@v4
        with:
          repository: Aicent-Stack/zcmk
          path: zcmk

      - name: "Assemble Organism: Body (GTIOT)"
        uses: actions/checkout@v4
        with:
          repository: Aicent-Stack/gtiot
          path: gtiot

      - name: "Assemble Organism: Hive (AICENT-NET)"
        uses: actions/checkout@v4
        with:
          repository: Aicent-Stack/aicent-net
          path: aicent-net

      - name: "Assemble Organism: Demo Suite (AICENT-DEMO)"
        uses: actions/checkout@v4
        with:
          repository: Aicent-Stack/aicent-demo
          path: aicent-demo

      # --- STAGE 2: ENVIRONMENT CALIBRATION ---
      - name: "Initialize Rust Toolchain (v1.75+)"
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: "Neural Asset Caching"
        # Speeds up subsequent runs by caching compiled crates and dependencies
        uses: Swatinem/rust-cache@v2

      # --- STAGE 3: PROTOCOL INTEGRITY AUDIT ---
      - name: "Audit: Format Homeostasis"
        # Validates that all code follows the strict Aicent formatting standard
        run: cargo fmt --all -- --check

      - name: "Audit: Workspace Logic & Dependency Sync"
        # Performs a comprehensive structural audit of the 10-repo ecosystem
        run: cargo check --workspace --all-targets

      - name: "Audit: Cross-Domain Unit Tests"
        # Executes all internal logic tests for the individual reflex arcs
        run: cargo test --workspace --all-features

      - name: "Audit: Standard Binary Verification"
        # Ensures all 6 high-performance demo binaries can compile for production
        run: cargo check --workspace --bins
