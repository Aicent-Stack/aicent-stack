[package]
name = "aicent-net"
description = "AICENT-NET: Global Operational Grid and Collective Intelligence Protocol [RFC-006]"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage = "http://aicent.net"
documentation = "https://github.com/Aicent-Stack/manifesto/blob/main/rfcs/RFC-006-AICENT-NET.md"
keywords = ["sovereign-ai", "collective-intelligence", "rfc-006", "operational-grid"]
categories = ["distributed-computing", "network-programming"]
rust-version = "1.75"

[dependencies]
# --- Core Domain Orchestration ---
# The Hive coordinates individual nodes (Brain, Nerves, Immunity, Blood, Body)
aicent = { workspace = true }
rttp   = { workspace = true }
rpki   = { workspace = true }
zcmk   = { workspace = true }
gtiot  = { workspace = true }

# --- Planetary Orchestration & Grid Logic ---
async-trait.workspace = true
serde = { workspace = true, features = ["derive"] }
crossbeam = { workspace = true }
parking_lot = { workspace = true }
once_cell = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
futures = { workspace = true }

[features]
default = ["std"]
std = ["serde/std"]
# [RFC-006] Enable collective intelligence simulations
swarm-simulation = []
