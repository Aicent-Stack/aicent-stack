# Aicent Stack | The Sovereign AI Nervous System
# Domain: http://aicent.com
# Specification: Unified Workspace for RFC-001/002/003/004/005
# Licensed under Apache-2.0 via Aicent.com Organization.
# 
# [RFC-001] AICENT: The Brain
# [RFC-002] RTTP:   The Nerves
# [RFC-003] RPKI:   The Immunity
# [RFC-004] ZCMK:   The Blood
# [RFC-005] GTIOT:  The Body

[workspace]
members = [
    "aicent",
    "rttp",
    "rpki",
    "zcmk",
    "gtiot",
    "aicent-demo",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2026"
authors = ["Aicent Stack Team <lee@aicent.com>"]
license = "Apache-2.0"
repository = "https://github.com/Aicent-Stack"
keywords = ["ai-infra", "sovereign-ai", "low-latency", "dep-in", "rust"]
categories = ["network-programming", "asynchronous", "hardware"]
rust-version = "1.75"

[workspace.dependencies]
# Unify dependency version management (you can change this later).
serde = { version = "1.0", features = ["derive"] }
anyhow = "1.0"
bytes = "1.6"
tokio = { version = "1", features = ["full"] }
rand = "0.8"
rayon = "1.10"
crossbeam-channel = "0.5"
thiserror = "1.0"

# If you need to cross-create dependencies in the future, you can declare them here.
# rttp = { path = "rttp" }
# rpki = { path = "rpki" }
