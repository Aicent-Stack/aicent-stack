[workspace]
members = [
    "aicent",
    "rttp",
    "rpki",
    "zcmk",
    "gtiot",
    "aicent-net",
    "aicent-demo",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Aicent Stack Team <lee@aicent.com>"]
license = "Apache-2.0"
repository = "https://github.com/Aicent-Stack"
homepage = "http://aicent.com"
rust-version = "1.75"

# ====================================================================
# [WORKSPACE DEPENDENCIES] - The Absolute Source of Truth
# ====================================================================

[workspace.dependencies]
# --- Internal Domain Linking ---
aicent     = { path = "aicent" }
rttp       = { path = "rttp" }
rpki       = { path = "rpki" }
zcmk       = { path = "zcmk" }
gtiot      = { path = "gtiot" }
aicent-net = { path = "aicent-net" }

# --- High-Performance Primitives ---
tokio = { version = "1.37", features = ["full"] }
rayon = "1.10"
crossbeam = "0.8"
crossbeam-channel = "0.5"
# 🛡️ Critical fix: Replenish the blood system's required queues.
crossbeam-queue = "0.3" 
parking_lot = "0.12"
async-trait = "0.1"
futures = "0.3"

# --- Data & Safety ---
serde = { version = "1.0", features = ["derive"] }
anyhow = "1.0"
thiserror = "1.0"
bytes = "1.6"
smallvec = "1.13"
zeroize = "1.7"
tracing = "0.1"
rand = "0.8"

# --- Cryptography & Hardware ---
ring = "0.17"
sha2 = "0.10"
embassy-executor = { version = "0.5", features = ["task-arena-size-32768"] }
embassy-time = "0.3"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
