[workspace]
members = [
    "aicent",
    "rttp",
    "rpki",
    "zcmk",
    "gtiot",
    "aicent-net",
    "aicent-demo",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Aicent Stack Team <lee@aicent.com>"]
license = "Apache-2.0"
repository = "https://github.com/Aicent-Stack"
homepage = "http://aicent.com"
rust-version = "1.75"
keywords = ["sovereign-ai", "low-latency", "rfc-standard", "robotics", "fintech"]
categories = ["asynchronous", "embedded", "network-programming", "cryptography"]

# ====================================================================
# [WORKSPACE DEPENDENCIES] - The Central Armory
# All sub-crates inherit these versions to ensure metabolic consistency.
# ====================================================================

[workspace.dependencies]
# --- Core Organism Internal Linking ---
aicent     = { path = "aicent" }
rttp       = { path = "rttp" }
rpki       = { path = "rpki" }
zcmk       = { path = "zcmk" }
gtiot      = { path = "gtiot" }
aicent-net = { path = "aicent-net" }

# --- High-Performance Neural Orchestration ---
tokio = { version = "1.37", features = ["full"] }
rayon = "1.10"                 # Parallel SIMD scanning for RPKI
crossbeam = "0.8"              # Lock-free data structures
crossbeam-channel = "0.5"      # High-frequency messaging
crossbeam-queue = "0.3"        # Nanosecond task shunting for ZCMK
parking_lot = "0.12"           # Faster atomic locks for 1.2kHz loops
once_cell = "1.19"             # Safe static initialization of global states
async-trait = "0.1"            # Cognitive trait abstractions
futures = "0.3"                # High-throughput Hive-Mind streams

# --- Data Sovereignty & Memory Safety ---
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bytes = "1.6"                  # Zero-copy buffer management for Pulse Frames
smallvec = "1.13"              # Stack-allocation optimization for motor primitives
zeroize = "1.7"                # Secure memory clearing for cryptographic seeds

# --- Cryptography & Integrity (The Immune DNA) ---
ring = "0.17"                  # Core steganography for tensor watermarking
sha2 = "0.10"                  # Merkle-DAG hashing for identity chains

# --- Hardware Adaptation (Embodied Intelligence) ---
embassy-executor = { version = "0.5", features = ["task-arena-size-32768"] }
embassy-time = "0.3"

# --- Error Handling & Telemetry ---
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"                # Industrial-grade telemetry and diagnostics
rand = "0.8"                   # For entropy and chaos-testing simulations

# ====================================================================
# [WORKSPACE LINTS] - Quality Enforcement (Carrier-Grade Rigor)
# ====================================================================

[workspace.lints.rust]
unsafe_op_in_unsafe_fn = "warn"
missing_docs = "warn"

[workspace.lints.clippy]
# Enforce security and performance standards
undocumented_unsafe_blocks = "warn"
manual_memcpy = "warn"
perf = "warn"
pedantic = "warn"

# ====================================================================
# [PROFILES] - Optimized for Sub-Millisecond Finality
# ====================================================================

[profile.release]
opt-level = 3                 # Maximum optimization for production reflexes
lto = "fat"                   # Link-Time Optimization for cross-crate speed
codegen-units = 1             # Better binary density for hardware caches
panic = "abort"               # Ensure absolute determinism in failure states
