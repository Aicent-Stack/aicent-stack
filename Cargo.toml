# Aicent Stack | The Sovereign AI Nervous System
# Domain: http://aicent.com
# Specification: Unified Workspace for RFC-001/002/003/004/005
# Licensed under Apache-2.0 via Aicent.com Organization.
# 
# [RFC-001] AICENT: The Brain
# [RFC-002] RTTP:   The Nerves
# [RFC-003] RPKI:   The Immunity
# [RFC-004] ZCMK:   The Blood
# [RFC-005] GTIOT:  The Body

[workspace]
members = [
    "aicent",
    "rttp",
    "rpki",
    "zcmk",
    "gtiot",
    "aicent-net",
    "aicent-demo",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"  # Standard stable edition for high-perf Rust
authors = ["Aicent Stack Team <lee@aicent.com>"]
license = "Apache-2.0"
repository = "https://github.com/Aicent-Stack"
homepage = "http://aicent.com"
keywords = ["ai-infra", "sovereign-ai", "low-latency", "depin", "rfc-standard"]
categories = ["network-programming", "embedded", "cryptography"]
rust-version = "1.75"

# ====================================================================
# [WORKSPACE DEPENDENCIES] - The Organism's Shared DNA
# Centralized versioning for the entire 5-domain stack.
# ====================================================================

[workspace.dependencies]
# --- Core Organism Linking ---
# Enabling internal crates to reference each other via workspace.
aicent = { path = "aicent" }
rttp   = { path = "rttp" }
rpki   = { path = "rpki" }
zcmk   = { path = "zcmk" }
gtiot  = { path = "gtiot" }

# --- High-Performance Async & Concurrency ---
tokio = { version = "1.37", features = ["full"] }
rayon = "1.10"                # For Parallel SIMD-level tasks (RPKI scans)
crossbeam = "0.8"             # High-frequency lock-free data structures
parking_lot = "0.12"          # Faster mutexes for sub-ms reflex arcs

# --- Data & Memory Safety ---
serde = { version = "1.0", features = ["derive"] }
bytes = "1.6"                 # Zero-copy buffer management (RTTP Pulse Frames)
smallvec = "1.13"             # Stack allocation optimization for nanosecond dispatch
zeroize = "1.7"               # Secure memory clearing for RPKI credentials

# --- Error Handling & Diagnostics ---
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"               # High-performance telemetry for cognitive cycles

# --- Embedded & Hardware (GTIOT Adaptation) ---
embassy-executor = { version = "0.5", features = ["task-arena-size-32768"] }
embassy-time = "0.3"

# --- Cryptography & Identity (RPKI) ---
ring = "0.17"                 # Core crypto for tensor watermarking
sha2 = "0.10"                 # Merkle DAG hashing

# ====================================================================
# [WORKSPACE LINTS] - Quality Enforcement
# Shows the world that Aicent Stack code is rigorous and audit-ready.
# ====================================================================

[workspace.lints.clippy]
# Disallow unsafe without comments (Critical for RPKI/RTTP security)
undocumented_unsafe_blocks = "warn"
# Optimization lints
manual_memcpy = "warn"
perf = "warn"

[profile.release]
opt-level = 3                 # Maximum optimization for production reflexes
lto = "fat"                   # Link-Time Optimization for cross-crate speed
codegen-units = 1             # Better optimization at the cost of compile time
panic = "abort"               # Minimize binary size and prevent memory leaks
