# Aicent Stack | The Sovereign AI Nervous System
# Domain: http://aicent.com & http://aicent.net
# ====================================================================
# [CORE ORGANISM SPECIFICATIONS]
# [RFC-001] AICENT: The Brain    (Active / Standard) - Cognitive Orchestration
# [RFC-002] RTTP:   The Nerves   (Active / Standard) - Neural Transport Protocol
# [RFC-003] RPKI:   The Immunity (Active / Standard) - Parallel Tensor Watermarking
# [RFC-004] ZCMK:   The Blood    (Active / Standard) - Zero-Commission Settlement
# [RFC-005] GTIOT:  The Body     (Active / Standard) - Physical Reflex & Actuation
#
# [COLLECTIVE INTELLIGENCE SPECIFICATIONS]
# [RFC-006] AICENT-NET: The Hive (Draft / Active Evolution) - Planetary Grid Coordination
# ====================================================================
# Licensed under Apache-2.0 via Aicent.com Organization.

[workspace]
members = [
    "aicent",
    "rttp",
    "rpki",
    "zcmk",
    "gtiot",
    "aicent-net",
    "aicent-demo",
]
resolver = "2" # Use the latest resolver for optimal dependency management.

[workspace.package]
version = "1.0.0" # Official Standard 1.0 release across all modules.
edition = "2024"  # Targeting the latest stable Rust edition for maximum future compatibility.
authors = ["Aicent Stack Team <lee@aicent.com>"]
license = "Apache-2.0"
repository = "https://github.com/Aicent-Stack"
homepage = "http://aicent.com"
# Keywords and categories for high discoverability in Rust ecosystem.
keywords = ["sovereign-ai", "low-latency", "rfc-standard", "128-bit-atomic", "carrier-grade", "hive-mind", "cybernetics"]
categories = ["asynchronous", "embedded", "network-programming", "cryptography", "distributed-computing", "systems"]
rust-version = "1.85" # Explicitly stating target Rust version for compiler safety.

# ====================================================================
# [WORKSPACE DEPENDENCIES] - The Organism's Integrated DNA
# Centralized versioning for all sub-crates ensures maximum stability and performance.
# ====================================================================

[workspace.dependencies]
# --- Core Domain Linking ---
# Explicitly define paths and features for cross-domain interaction.
aicent = { path = "aicent" }
rttp = { path = "rttp" }
rpki = { path = "rpki" }
zcmk = { path = "zcmk" }
gtiot = { path = "gtiot" }
aicent-net = { path = "aicent-net" }

# --- High-Performance Async & Concurrency ---
# Tokio 1.37+ for mission-critical, high-throughput task orchestration.
tokio = { version = "1.37", features = ["full"] }
# Rayon for parallel processing in RPKI verification (SIMD lanes).
rayon = "1.10"
# Crossbeam primitives for lock-free data structures and high-frequency messaging.
crossbeam = "0.8"
crossbeam-channel = "0.5"
crossbeam-queue = "0.3"
# Optimized synchronization primitives for sub-millisecond reflexes.
parking_lot = "0.12"
# Safe static initialization for global neural states.
once_cell = "1.19"
# Trait abstraction for defining autonomic behaviors.
async-trait = "0.1"
# High-throughput stream handling for global grid synchronization.
futures = "0.3"

# --- Data Sovereignty & Memory Safety ---
# Zero-copy buffer management and 128-bit atomic operations for financial precision.
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bytes = "1.6"
smallvec = { version = "1.13", features = ["serde"] }
num-traits = { version = "0.2", default-features = false, features = ["libm"] }
zeroize = { version = "1.7", features = ["derive"] } # [SECURITY] Secure memory clearing.

# --- Cryptography & Integrity ---
ring = "0.17"                  # Hardware-accelerated crypto for RPKI & AID signatures.
sha2 = "0.10"                  # Merkle-DAG hashing for ROA-Chain integrity.

# --- Hardware-Native Adaptation ---
# Embassy for real-time OS simulation and bare-metal compatibility.
embassy-executor = { version = "0.5", features = ["task-arena-size-32768"] }
embassy-time = { workspace = true, features = ["std"] } # std for simulation compatibility

# --- Telemetry & Diagnostics ---
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"                # Planetary-scale grid telemetry.
rand = "0.8"                   # Simulated entropy for RPKI stress-testing.

# --- Development & Benchmarking ---
criterion = "0.5"

# ====================================================================
# [WORKSPACE LINTS] - Quality Gating (Carrier-Grade Rigor)
# Enforcing strict engineering standards across the 10-repo empire.
# ====================================================================

[workspace.lints.rust]
unsafe_op_in_unsafe_fn = "warn"
missing_docs = "warn"

[workspace.lints.clippy]
# Strict checks for performance optimization and security practices.
undocumented_unsafe_blocks = "warn"
manual_memcpy = "warn"
perf = "warn"
pedantic = "warn"

# ====================================================================
# [RELEASE PROFILES] - Engineered for Sub-Millisecond Finality
# These profiles generate the fastest possible machine code for production.
# ====================================================================

[profile.release]
opt-level = 3                 # Maximum optimization for production reflexes.
lto = "fat"                   # Full Link-Time Optimization for cross-crate performance.
codegen-units = 1             # Encourages deeper optimization at the cost of compile time.
panic = "abort"               # Ensures absolute determinism; avoids runtime overhead.
strip = true                  # Strip symbols for smaller binary size.
