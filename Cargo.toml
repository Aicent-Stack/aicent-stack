# Domain: http://aicent.com & http://aicent.net
# ====================================================================
# [INDIVIDUAL REFLEX SPECIFICATIONS]
# [RFC-001] AICENT: The Brain    (Active / Standard)
# [RFC-002] RTTP:   The Nerves   (Active / Standard)
# [RFC-003] RPKI:   The Immunity (Active / Standard)
# [RFC-004] ZCMK:   The Blood    (Active / Standard)
# [RFC-005] GTIOT:  The Body     (Active / Standard)
#
# [COLLECTIVE INTELLIGENCE SPECIFICATIONS]
# [RFC-006] AICENT-NET: The Hive (Draft / Active Evolution)
# ====================================================================
# Licensed under Apache-2.0 via Aicent.com Organization.

[workspace]
# Orchestrating the physical boundaries of the Aicent Stack organism.
members = [
    "aicent",
    "rttp",
    "rpki",
    "zcmk",
    "gtiot",
    "aicent-net",
    "aicent-demo",
]
# Resolver v2 ensures conflict-free feature resolution for 128-bit manifolds.
resolver = "2"

[workspace.package]
version = "1.0.0" # Official Sovereign Launch Version
edition = "2024"  # Targeting the latest stable edition for future-proofing
authors = ["Aicent Stack Team <lee@aicent.com>"]
license = "Apache-2.0"
repository = "https://github.com/Aicent-Stack"
homepage = "http://aicent.com"
rust-version = "1.85.0" # Mandating 1.85+ for native AtomicU128 and edition 2024
keywords = ["sovereign-ai", "low-latency", "rfc-standard", "128-bit-atomic", "carrier-grade"]
categories = ["asynchronous", "embedded", "network-programming", "cryptography", "distributed-computing"]

# ====================================================================
# [WORKSPACE DEPENDENCIES] - The Integrated Genetic Bank
# Centralized versioning ensures absolute metabolic consistency across domains.
# ====================================================================

[workspace.dependencies]
# --- Internal Domain Linking (Unidirectional Authority) ---
aicent     = { path = "aicent" }
rttp       = { path = "rttp" }
rpki       = { path = "rpki" }
zcmk       = { path = "zcmk" }
gtiot      = { path = "gtiot" }
aicent-net = { path = "aicent-net" }

# --- High-Performance Asynchronous & Concurrency Primitives ---
# Powering the sub-millisecond reflex arc and HFT-grade matching engines.
tokio = { version = "1.37", features = ["full"] }
rayon = "1.10"                 # Parallel SIMD scanning for RPKI verification
crossbeam = "0.8"              # Lock-free data primitives for 128-bit manifolds
crossbeam-queue = "0.3"        # Nanosecond task shunting for RTBA matching
crossbeam-channel = "0.5"      # High-frequency inter-organ messaging
parking_lot = "0.12"           # Hardware-optimized mutexes for low-jitter loops
once_cell = "1.19"             # Safe thread-safe initialization of neural states
async-trait = "0.1"            # Trait abstraction for sovereign cognitive orchestration
futures = "0.3"                # High-throughput stream handling for Hive synchronization

# --- Data Sovereignty & Memory Safety ---
# Ensuring zero-data-tearing and precision at the 10^-12 scale.
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bytes = { version = "1.6", features = ["serde"] } 
# 🛡️ FIX: smallvec only uses "serde". Do NOT include "std" feature to avoid resolution errors.
smallvec = { version = "1.13", features = ["serde"] } 
# 🛡️ FIX: num-traits must use libm and disable default features to prevent workspace conflicts.
num-traits = { version = "0.2", default-features = false, features = ["libm"] } 
zeroize = { version = "1.7", features = ["derive"] } # [SECURITY] Secure memory zeroing

# --- Cryptography & Physical Guard (The Immune DNA) ---
# Hardware-accelerated primitives for trust and provenance.
ring = "0.17"                  # Hardware-accelerated crypto for Tensor Watermarking
sha2 = "0.10"                  # Merkle-DAG hashing for ROA-Chain attestation

# --- Hardware-Native Adaptation (Embodied Intelligence) ---
# Hard real-time primitives for 1.2 kHz robotic reflexes.
embassy-executor = { version = "0.5", features = ["task-arena-size-32768"] }
embassy-time = { version = "0.3", features = ["std"] } 
nalgebra = { version = "0.32", default-features = false, features = ["libm"] } 

# --- Telemetry & Diagnostics ---
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"                # Planetary-scale grid telemetry and diagnostics
rand = "0.8"                   # Simulated entropy for RPKI chaos testing

# --- Performance Validation & Benchmarking ---
# Elevated to workspace level to ensure consistent audit reporting.
criterion = { version = "0.5", features = ["async_tokio"] }

# ====================================================================
# [WORKSPACE LINTS] - Quality Gating (Carrier-Grade Rigor)
# Enforcing strict engineering standards for industrial auditing.
# ====================================================================

[workspace.lints.rust]
unsafe_op_in_unsafe_fn = "warn"
missing_docs = "warn"

[workspace.lints.clippy]
# Enforcing absolute security and performance optimization patterns
undocumented_unsafe_blocks = "warn"
manual_memcpy = "warn"
perf = "warn"
pedantic = "warn"

# ====================================================================
# [RELEASE PROFILES] - Engineered for Sub-Millisecond Finality
# Maximizing binary density and hardware instruction pipeline efficiency.
# ====================================================================

[profile.release]
opt-level = 3                 # Maximum optimization for production reflexes
lto = "fat"                   # Full Link-Time Optimization for cross-crate speed
codegen-units = 1             # Better binary density and cache locality
panic = "abort"               # Ensures absolute determinism; avoids stack unwinding tax
strip = true                  # Remove symbols to minimize binary footprint
