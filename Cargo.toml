[workspace]
members = [
    "aicent",
    "rttp",
    "rpki",
    "zcmk",
    "gtiot",
    "aicent-net",
    "aicent-demo",
]
resolver = "2"

[workspace.package]
version = "1.0.0" # Official Standard 1.0 release
edition = "2021"
authors = ["Aicent Stack Team <lee@aicent.com>"]
license = "Apache-2.0"
repository = "https://github.com/Aicent-Stack"
homepage = "http://aicent.com"
rust-version = "1.75"
keywords = ["sovereign-ai", "low-latency", "rfc-standard", "128-bit-atomic", "carrier-grade"]
categories = ["asynchronous", "embedded", "network-programming", "cryptography", "distributed-computing"]

# ====================================================================
# [WORKSPACE DEPENDENCIES] - The Organism's Integrated DNA
# Centralized versioning for the entire six-domain stack.
# ====================================================================

[workspace.dependencies]
# --- Core Organism Linking ---
aicent     = { path = "aicent" }
rttp       = { path = "rttp" }
rpki       = { path = "rpki" }
zcmk       = { path = "zcmk" }
gtiot      = { path = "gtiot" }
aicent-net = { path = "aicent-net" }

# --- High-Performance Asynchronous Backbone ---
# [PERF] Tokio 1.37+ for mission-critical task orchestration
tokio = { version = "1.37", features = ["full"] }
rayon = "1.10"                 # Parallel SIMD scanning for RPKI pipelines
crossbeam = "0.8"              # Lock-free data primitives for sub-ms reflex arcs
crossbeam-channel = "0.5"      # High-frequency inter-organ messaging
crossbeam-queue = "0.3"        # Nanosecond task shunting for RTBA matching
parking_lot = "0.12"           # Hardware-optimized mutexes for HFT-grade logic
once_cell = "1.19"             # Safe thread-safe initialization of global manifolds
async-trait = "0.1"            # Trait abstraction for Sovereign AID orchestration
futures = "0.3"                # High-throughput stream handling for Hive-sync

# --- Data Sovereignty & Memory Safety ---
# [PERF] Strict zero-copy buffer management and 128-bit precision math.
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bytes = "1.6"                  # Zero-copy RTTP Pulse Frame buffers
smallvec = "1.13"              # Stack-allocation optimization for motor primitives
num-traits = "0.2"             # Precision math for picotoken clearing
zeroize = "1.7"                # [SECURITY] Secure memory clearing for cryptographic seeds

# --- Cryptography & Physical Guard (The Immune DNA) ---
ring = "0.17"                  # Core crypto for In-band Tensor Watermarking
sha2 = "0.10"                  # Merkle-DAG hashing for ROA-Chain provenance

# --- Hardware-Native Adaptation (Embodied Intelligence) ---
embassy-executor = { version = "0.5", features = ["task-arena-size-32768"] }
embassy-time = "0.3"

# --- Telemetry & Diagnostics ---
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"                # Planetary-scale grid telemetry and diagnostics
rand = "0.8"                   # Simulated entropy for chaos testing

# ====================================================================
# [WORKSPACE LINTS] - Quality Gating
# Enforcing carrier-grade engineering rigor across the entire organism.
# ====================================================================

[workspace.lints.rust]
unsafe_op_in_unsafe_fn = "warn"
missing_docs = "warn"

[workspace.lints.clippy]
undocumented_unsafe_blocks = "warn"
manual_memcpy = "warn"
perf = "warn"
pedantic = "warn"

# ====================================================================
# [RELEASE PROFILES] - Engineered for Sub-Millisecond Finality
# This configuration generates the fastest possible machine code.
# ====================================================================

[profile.release]
opt-level = 3                 # Maximum optimization for production reflexes
lto = "fat"                   # Link-Time Optimization for cross-crate performance
codegen-units = 1             # Better binary density and cache locality
panic = "abort"               # Ensure absolute determinism; avoid stack unwinding tax
