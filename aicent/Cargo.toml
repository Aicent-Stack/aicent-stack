[package]
name = "aicent"
description = "Aicent Brain: Sovereign AI Identity and Cognitive Orchestration Protocol [RFC-001]"
# Inheriting core metadata from the imperial root workspace
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage = "http://aicent.com"
documentation = "https://github.com/Aicent-Stack/manifesto/blob/main/rfcs/RFC-001-AICENT-BRAIN.md"
rust-version.workspace = true

# Keywords and categories for planetary-scale discoverability
keywords = ["sovereign-ai", "orchestration", "cognitive-hub", "rfc-001", "128-bit-atomic"]
categories = ["ai", "asynchronous", "science", "distributed-computing"]

[dependencies]
# --- Core Organism Linking (Unidirectional Dependency Flow) ---
# The Brain orchestrates the Nerves, Immunity, Blood, and Body layers.
# These are strictly synchronized via the workspace manifest.
rttp = { workspace = true, features = ["std"] }
rpki = { workspace = true, features = ["std"] }
zcmk = { workspace = true, features = ["std"] }
gtiot = { workspace = true, features = ["std"] }

# [RFC-006] Optional integration with the Aicent-Net Hive.
# Declared as optional to prevent cyclic dependencies while allowing Hive-Mind convergence.
aicent-net = { workspace = true, optional = true, features = ["std"] }

# --- Cognitive Orchestration Primitives ---
# High-fidelity tools for intent decomposition and state-manifold reasoning.
serde       = { workspace = true, features = ["derive"] }
anyhow      = { workspace = true }
tokio       = { workspace = true, features = ["full"] }
tracing     = { workspace = true }        # Industrial-grade telemetry for cognitive cycles
async-trait = { workspace = true }        # Trait abstraction for Sovereign AID orchestration
once_cell   = { workspace = true }        # High-performance static state management for manifolds

[features]
# Standard implementation: Enables full feature-set for cloud-scale environments.
default = ["std"]

# [Standard v1.0] Standard library support for general-purpose compute.
# This ensures that 'std' is propagated to all underlying organs to maintain homeostasis.
std = [
    "serde/std",
    "anyhow/std",
    "rttp/std",
    "rpki/std",
    "zcmk/std",
    "gtiot/std",
    "tokio/full"
]

# [RFC-006] Sovereign Hive-Mind Feature Flag.
# Enabling this activates the global operational grid synchronization.
hive-sync = ["aicent-net"]

[dev-dependencies]
# Benchmarking tools for validating sub-millisecond cognitive reasoning finality.
criterion = { workspace = true, features = ["async_tokio"] }
