[package]
name = "aicent"
description = "Aicent Brain: Sovereign AI Identity and Cognitive Orchestration Protocol [RFC-001]"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository = "https://github.com/Aicent-Stack/aicent" # Points to its own independent repository
homepage = "http://aicent.com"
documentation = "https://github.com/Aicent-Stack/manifesto/blob/main/rfcs/RFC-001-AICENT-BRAIN.md"
keywords = ["sovereign-ai", "orchestration", "cognitive-hub", "rfc-001", "aicent-stack", "128-bit-atomic"]
categories = ["ai", "asynchronous", "science", "distributed-computing"]
rust-version.workspace = true # Explicitly inherit rust-version for consistency

[dependencies]
# --- Core Domain Orchestration (Unidirectional Dependency Flow) ---
# The Brain orchestrates the nervous system (RTTP), immunity (RPKI), 
# value metabolism (ZCMK), and physical execution (GTIOT).
rttp = { workspace = true }
rpki = { workspace = true }
zcmk = { workspace = true }
gtiot = { workspace = true }

# [RFC-006] Optional integration with the Aicent-Net Hive for collective intelligence.
# This dependency is explicitly optional to break the cyclic dependency with aicent-net.
aicent-net = { workspace = true, optional = true } 

# --- Cognitive Orchestration Primitives ---
# High-fidelity tools for intent decomposition and state-manifold reasoning.
serde = { workspace = true, features = ["derive"] }
anyhow = { workspace = true }
tokio = { workspace = true } # Utilizes Tokio for async orchestration
tracing = { workspace = true }        # Industrial-grade telemetry for cognitive cycles
async-trait = { workspace = true }    # Trait abstraction for Sovereign AID orchestration
once_cell = { workspace = true }      # High-performance static state management

[features]
default = ["std"]
# [Standard v1.0] Standard library support for general-purpose compute.
# Explicitly re-exporting 'std' for all foundational Aicent Stack dependencies.
std = [
    "rttp/std", 
    "rpki/std", 
    "zcmk/std", 
    "gtiot/std"
]

# [RFC-006] Feature flag to enable collective Hive-Mind convergence.
# This explicitly brings in 'aicent-net' when hive-sync is needed.
hive-sync = ["aicent-net/std"] 

[dev-dependencies]
# Benchmarking tools for validation of sub-ms cognitive resolution.
criterion = { workspace = true }
